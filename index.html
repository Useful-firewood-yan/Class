<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>6C Clover 紀念冊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Poppins', system-ui, sans-serif;
            background: #eef5ea;
            color: #1f2e1c;
            line-height: 1.5;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            background: #fafef7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(70, 110, 55, 0.08);
        }

        .top-nav {
            background: linear-gradient(105deg, #b2ebd6 0%, #9ed9c2 100%);
            width: 100%;
            padding: 0.85rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.6);
        }

        .logo-area {
            display: flex;
            align-items: center;
            cursor: pointer;
            gap: 8px;
        }
        .logo-img {
            height: 42px;
            width: auto;
            max-width: 120px;
            object-fit: contain;
            border-radius: 12px;
        }
        .logo-text {
            font-size: 1.55rem;
            font-weight: 600;
            color: #1f4427;
        }

        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .nav-btn {
            background: rgba(255, 255, 245, 0.85);
            border: none;
            padding: 0.6rem 1.25rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            color: #235b2a;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .nav-btn:hover {
            background: white;
            transform: translateY(-2px);
        }
        .nav-btn.active {
            background: #f7ffea;
            box-shadow: inset 0 0 0 2px #4b8b3f;
        }

        .content-panel {
            flex: 1;
            padding: 2rem;
        }

        .section-card {
            background: rgba(255, 255, 250, 0.96);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 12px 28px rgba(55, 80, 40, 0.08);
            border: 1px solid rgba(150, 190, 130, 0.3);
        }

        .section-title {
            font-size: 1.9rem;
            font-weight: 600;
            color: #2c6e3c;
            border-left: 6px solid #74c690;
            padding-left: 1rem;
            margin-bottom: 1.8rem;
        }

        .teacher-msg {
            background: #f4fce8;
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-left: 5px solid #6aa97b;
            cursor: pointer;
            transition: all 0.2s;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }
        .teacher-msg:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            background: #f0fce4;
        }
        .teacher-name {
            font-weight: bold;
            color: #2d6a3b;
            font-size: 1.1rem;
        }
        .teacher-preview {
            font-size: 0.9rem;
            color: #5a6e52;
            margin-top: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .teacher-hint {
            font-size: 0.65rem;
            color: #8fb37c;
            margin-top: 8px;
            text-align: right;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
            animation: fadeInUp 0.4s ease;
        }
        .modal-close {
            position: sticky;
            top: 0;
            float: right;
            font-size: 2rem;
            cursor: pointer;
            color: #999;
            background: white;
            padding: 0 0 0 10px;
            z-index: 10;
        }
        .modal-close:hover {
            color: #333;
        }
        .modal-name {
            font-size: 1.6rem;
            font-weight: bold;
            color: #2c6e3c;
            margin-bottom: 1.2rem;
            padding-right: 30px;
        }
        .modal-message {
            font-size: 1rem;
            line-height: 1.8;
            color: #2d3e28;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto; 
        }
        .modal-message a {
            color: #3c7e48;
            text-decoration: underline;
        }
        .modal-message a:hover {
            color: #569e6b;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .carousel-container {
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }
        .carousel-track-3 {
            display: flex;
            transition: transform 0.5s ease;
            gap: 1.5rem;
        }
        .carousel-card-3 {
            flex: 0 0 calc(33.333% - 1rem);
            min-width: calc(33.333% - 1rem);
            background: linear-gradient(145deg, #ffffff, #fefce8);
            border-radius: 28px;
            padding: 1.2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border: 2px solid #cbe5c0;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }
        .carousel-card-3:hover {
            transform: translateY(-5px);
            background: #fffff5;
            border-color: #9ed18a;
        }
        .card-name-3 {
            font-weight: bold;
            font-size: 1.2rem;
            color: #3c7e48;
            border-bottom: 2px dashed #c2dcb2;
            padding-bottom: 8px;
            margin-bottom: 10px;
            text-align: center;
        }
        .card-preview-3 {
            font-size: 0.8rem;
            color: #5a6e52;
            line-height: 1.5;
            flex: 1;
        }
        .card-hint-3 {
            margin-top: 10px;
            font-size: 0.65rem;
            color: #8fb37c;
            text-align: center;
        }
        .carousel-controls-3 {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .ctrl-btn {
            background: #77b28a;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .ctrl-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .page-info {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #6f9668;
        }

        .expanded-message {
            margin-top: 2rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, #f0f7ea, #e8f2e0);
            border-radius: 32px;
            border-left: 8px solid #6aa97b;
            animation: fadeInUp 0.4s ease;
            position: relative;
        }
        /* 動畫的意思*/
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .expanded-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2c6e3c;
            margin-bottom: 0.8rem;
        }
        .expanded-content {
            font-size: 1rem;
            line-height: 1.7;
            color: #2d3e28;
            white-space: pre-wrap;
        }
        .close-expand {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #8fb37c;
            float: right;
        }

        .info-note {
            background: #eef6e9;
            border-radius: 28px;
            padding: 1rem;
            text-align: center;
            margin-top: 1.5rem;
        }

        .quiz-area {
            background: #fef9e6;
            border-radius: 28px;
            padding: 1.5rem;
        }
        .quiz-question {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 1.2rem;
            line-height: 1.4;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .quiz-option {
            background: #eef3e9;
            padding: 0.7rem 1rem;
            border-radius: 60px;
            cursor: pointer;
            border: 1px solid #c2dcb2;
            transition: 0.1s;
        }
        .quiz-option:hover { background: #d9e8d0; }
        .result-area {
            text-align: center;
            padding: 1.5rem;
        }
        .score-big {
            font-size: 3rem;
            font-weight: bold;
            color: #2c6e3c;
        }
        .familiarity {
            font-size: 1.5rem;
            margin-top: 1rem;
            padding: 1rem;
            background: #e2f0da;
            border-radius: 48px;
        }

        .pdf-container {
            width: 100%;
            overflow-x: auto;
        }
        .pdf-iframe {
            width: 100%;
            height: 85vh;
            border: none;
            border-radius: 24px;
        }
        
        .links-section {
            margin-bottom: 2rem;
        }
        .links-subtitle {
            font-size: 1.3rem;
            font-weight: 600;
            color: #3c7e48;
            margin: 1.5rem 0 1rem 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #c8e0ba;
        }
        .links-list-vertical {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }
        .link-item-vertical {
            background: #e2f0da;
            border-radius: 20px;
            padding: 0.8rem 1.2rem;
            transition: 0.2s;
            border-left: 5px solid #6aa97b;
        }
        .link-item-vertical:hover {
            background: #d2e8c6;
            transform: translateX(5px);
        }
        .link-item-vertical a {
            text-decoration: none;
            font-weight: bold;
            color: #2c6e3c;
            display: block;
        }
        .link-desc {
            font-size: 0.75rem;
            color: #6f9668;
            margin-top: 5px;
        }
        .ig-card {
            background: linear-gradient(135deg, #fdf4e3, #ffe6f0);
            border-left-color: #e4405f;
        }
        .ig-card a {
            color: #c13584;
        }
        .links-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .link-card {
            background: #e2f0da;
            border-radius: 28px;
            padding: 1rem 1.5rem;
            transition: 0.2s;
            border-left: 8px solid #6aa97b;
            flex: 1;
            min-width: 220px;
        }

        .btn-submit {
            background: #77b28a;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }
        footer {
            text-align: center;
            padding: 1rem;
            color: #86a37c;
        }
        /* 不同媒介開啓的意思*/
        @media (max-width: 900px) {
            .carousel-card-3 {
                flex: 0 0 calc(50% - 0.75rem);
                min-width: calc(50% - 0.75rem);
            }
        }
        @media (max-width: 600px) {
            .carousel-card-3 {
                flex: 0 0 calc(50% - 0.75rem);   
                min-width: calc(50% - 0.75rem); 
            }
            .top-nav { padding: 0.8rem 1rem; }
            .section-title { font-size: 1.4rem; }
            .content-panel { padding: 1rem; }
            
        }
        /*id：加入Js的意思
css html js 三者的關係是什麽？ why同一個doc 出現這3個?

<body>

                <iframe loading="lazy" src="https://www.canva.com/design/DAHK03T4lxE/Ge549N4LRRH-gSdzyEtm2w/view?embed" allow="fullscreen" style="width:100%; height:100%; border:none; border-radius:12px;"></iframe>

<script>
    /*Js array*/
    const teacherMessages = [
        { name: "Dr LO", msg: `
給 456Clovers,   

    轉眼三年時光，就過了。在 Mr Lo 和同學的感受中，這三年的時間體感，我想是不一樣的。畢竟，年紀同經歷上實在不同。對於青年人，每一個經歷都很新鮮，尤其是在高中裏，同一班相處久了，充滿友情的伙伴一起讀書、玩樂和成長，是一生中其中一段最值得懷念的回憶。在晚會上，回看三年點點滴滴，實有珍貴。希望你哋一班 clovers 可以成為一生的友伴，互相扶持。
    
    對於大家，在當了父親之後的我，總不免以父親的角度，為大家考量。所以呢，我想對大家來說最重要的是，「你要保守你心，勝過保守一切，因為一生的果效是由心發出。」好好選擇確當的道路行，好好堅持！
    
    曾經分享過電影 Rocky Balboa 的一段片段，當中一段對話希望可以成為大家的一個支持。
"Let me tell you something you already know. The world ain't all sunshine and rainbows. It's a very mean and nasty place and I don't care how tough you are, it will beat you to your knees and keep you there permanently if you let it."
"You, me, or nobody hits is gonna hit as hard as life. But it ain't about how hard you hit, it's about how hard you get hit and keep movin' forward. How much you can take, and keep movin' forward. That's how winning is done!"
🔗 觀看片段：https://www.youtube.com/watch?v=vyYDz_A6HO8
    
    我想人生不是一場比賽，當中實在沒有輸贏成敗。我會形容更像一場遊戲，不竟大家都已經進場，遊戲仍然繼續中。但是遊戲的彈性十分大，有它難玩之處，亦有它好玩的地方，而且總是充滿驚喜，有時又有絕處逢生的幸運。The most enjoyable part is the journey itself, not the result. So enjoy your game！作為一個 game，總是要計算勝率。而勝率最重要是堅持在每一件事上盡力去做，絕不敷衍。
    
    早前，已經退休的網壇名將費達拿(Roger Federer) 在Dartmouth College 2024 的一場演講上說，他的得分率只是 54%，但是他勝出了80% 的球賽，足已令他成為世界第一。輸贏不在一分，而是每一分都盡自己最大的努力堅持，持之以恆，堅持自己的信念同目標！在人生長跑上，多一點的勝率已足夠勝出人生的球賽。
In his speech, he said, "The best in the world are not the best because they win every point. It's because they know they'll lose again and again, and have learned how to deal with it. You accept it. Cry it out if you need to then ... force a smile."
🔗 觀看演講：https://home.dartmouth.edu/news/2024/06/2024-commencement-address-roger-federer

    另外，納瓦爾 (Naval Ravikant) 在一個訪問裏提到："The only true test of intelligence is if you get what you want out of life. And there's two parts to this. One is getting what you want, so you know how to get it. And the second is wanting the right things, knowing what to want in the first place."
    
    認真了解自己所思所想，認識自己的局限，盡力挑戰自己，optimize 你的人生。
🔗 觀看訪問：https://www.instagram.com/reels/DH0hwxQziDp/
🔗 完整版本：https://www.youtube.com/watch?v=KyfUysrNaco

    對十八歲的您，一年的時光是是人生的 1/18，相當於 5.55%。到了三十而立之年，一年的時光變成了人生的 1/30，已經成了3.33%，往後的數十年裏，一年佔人生的比例會愈來愈低。所以好好把握離開主恩後的機會，好好學習，努力成長。在 AI 世代，我仍然相信認真學習，認真閱讀是最重要的，不要被 AI 洗去你寶貴學回來的知識同思考能力。
    
    最後，祝願大家在人生旅途上，揾到自己所想所愛，在迷失之時，僅記主的愛仍然在您身邊。

6C 班主任 Mr Lo Yiu Ming
June 13, 2026

🔗 完整版本：https://docs.google.com/document/d/16qO5iNJkW-gHIEuuxf18AJBGv7iO_01TWsOY4giIDug/edit?usp=sharing   (Use cdg account)
`},
        { name: "Ms. Tse (中文ver)", msg: `
給可愛的6C同學 :

身為班主任兼生物科老師，我最懷念的，是偶然突擊班房，請你們吃朱古力等零食；有時，你們剛上完體育課、大汗淋漓地回到課室準備上生物課時，我會親手為你們送上餅乾和朱古力來充飢，那些美好的時光總是令人難忘。在生物學上，這些甜點為你們迅速補充了身體所需的能量；但在心靈上，這更是我們師生之間最溫馨、最甜蜜的愛心連結。

你們的學術成績非常優秀，深信大家定能順利升讀大學，開展精彩的人生新一頁。正如耶穌溫柔地教導我們：「要愛人如己。」我衷心期盼你們未來能帶著這份無私的愛去服務社會，關懷身邊有需要的每一個人。在追求卓越與成功的同時，請務必保持謙遜，跟隨耶穌的腳步。

母校永遠是你們溫暖的家，期待你們學成歸來，用當天感受過的愛，攜手扶持並祝福學弟學妹。

掛念你們的班主任兼生物科秀賢老師
二零二六年六月四日
`},
        { name: "Ms. Tse (Eng ver)", msg: `

With love and fond memories,
Miss Tse (Class/Biology Teacher)
June 4, 2026

        { name: "吳老師", msg: `
中六丙班同學：

    回顧與中六丙班共度的三年時光，感情慢慢地在內心滋長，了無聲色，不知不覺六丙班已成了生活的一部分。時光荏苒，轉眼已是離別之時，門面說話，我不懂說，離別之情也非筆墨可抒，我只想感謝你們一路走來帶給我的一切一切，也感謝你們包容我的嚴厲和訓斥，尖酸和冷漠。

    這三年相處下來，我眼中的你們，比較被動，亦稍欠自信。但我想說：在上帝眼中，每個人都是寶貴的。你們要相信自己有著無限的可能，不要輕看自己。此外，人浮於事，社會瞬息萬變，將來你們將面對更大的競爭，所以不要再立於原地，呆等機會的到臨，反要主動出擊，爭取不同的機遇，積極為自己的前程鋪路。

    離開，是為了變得更獨立，更成熟。所以，我此刻是含笑揮手，目送你們離巢高飛，振翅遠颺。六丙班同學，你們要「常存信心和無虧的良心」，並緊記「信心因著行為纔得成全」。希望你們能懷著自信，靠著基督的信仰，邁出你們的腳步，實實在在行所當行的路，活出生命的價值，讓自己俯仰無愧於天地。

吳老師
二零二六年六月三日
`},
        { name: "Ms Lam", msg: `
Dear 456C 2023-2026,
 
Where did it start? I taught some of you in S.1 ENG and ENR at the height of the pandemic back in 2020. It just brought me great pleasure to reunite with you in S.4 and to meet some new faces. From the beginning I’ve known these three years was going to be enjoyable.
 
I would certainly miss the time when we had fruitful class discussions, debates, or games. I would certainly miss your clean and punctual homework record and your serious and meticulous homework – yes there had been a lot. Of course, what impressed me the most is your camaraderie, which had been the hallmark of our school and I think your Music Day performance with the self-written piece had set the bar very high, and everyone else in CDG looked up to you. They either wanted to be part of you or felt envious.
 
Seldom did I teach a class as sweet and as kind as you. I believe none of us would forget our last lesson in Room 505, when you shed so many tears of love. In fact, these three years had been tumultuous for me as I was crippled by illnesses, but you never ceased to show your care and understanding, which had been substantial in sustaining my teaching journey. All these have been turned into unique memories which are irreplaceable.
 
Congratulations on finishing the toughest exam! Oh but wait – I’d say – the even tougher exam just commences now. What is it?
 
It’s to say goodbye.
 
Yes. Graduation may mean that it could be the last time for you all to gather like this.
 
Each of you will go onto different paths. While I’ve faith in you that there’ll be reunions, the future looks challenging in the post-COVID era with the rise of AI, not to mention the hurdles each of you will face. I hope you’ll remember what I said: No matter how precious memories might be, they couldn’t conquer time. Only love can transcend it. And Jesus is the source of unconditional love. If there is one thing I wish you to remember as your teacher, it would be this. The most important thing is to reunite one day in heaven.
 
It’s a blessing to have created these memories together. You are always my pride and my joy. Don’t cry because it’s over (oh actually it’s okay, if not good, to cry!); smile because it happened. Oh – and I wish you bad luck. (wink)
 
With love (and lots of clovers),
Ms Lam
June 9, 2026
`},

    function escapeHtml(str) { 
        if(!str) return ''; 
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')   
            .replace(/'/g, '&#039;');  
    }

/*${} is JS官方語法，叫做「字串插值（String Interpolation）」。 似py 的f{} 一樣
Like py still have str and val crush tgt, so use ${} can help like f{}in py*/

    function openTeacherModal(name, msg) {
        document.getElementById('teacherModalName').innerHTML = `🌟 ${escapeHtml(name)}`;
    
    
        let formattedMsg = msg
            .replace(/\n/g, '<br>')  // 換行變 <br>恢復原狀
            .replace(
                /(https?:\/\/[^\s]+)/g,  // 找出所有網址
                '<a href="$1" target="_blank" rel="noopener noreferrer" style="color: #3c7e48; text-decoration: underline;">$1</a>'
            );
    
        document.getElementById('teacherModalMessage').innerHTML = formattedMsg;
        document.getElementById('teacherModal').style.display = 'flex';
    }

        document.getElementById('teacherModal').style.display = 'none';

            const preview = t.msg.substring(0, 80);
            html += `
                <div class="teacher-msg" data-name="${escapeHtml(t.name)}" data-msg="${escapeHtml(t.msg)}">
                    <div class="teacher-name">🌟 ${escapeHtml(t.name)}</div>
                    <div class="teacher-preview">${escapeHtml(preview)}...</div>
                    <div class="teacher-hint">👇 點擊放大完整留言</div>
                </div>
            `;
        });
        html += `<div class="info-note">💖 多謝各位老師依三年的教導，我們會帶著在主恩的愛一直走下去的！</div></div>`;
        return html;
    }

    function bindTeacherEvents() {
        const cards = document.querySelectorAll('.teacher-msg');
        cards.forEach(card => {
            card.onclick = () => {
                const name = card.getAttribute('data-name');
                const msg = card.getAttribute('data-msg');
                openTeacherModal(name, msg);
            };
        });
    }
    /*
    在 JavaScript 中，+= 是一個常用的官方運算子，（Addition Assignment）。
    用最簡單的話來說，它的功用就是：「在原本已經寫好的內容後面，『再依序黏上（累加）新的內容。」
    javascript
 1. 一開始，紙箱裡只有一句標題
let html = `<div>🌟 老師留言區</div>`;

// 2. 💡 使用 += 號：保留原本的標題，並在「後面」接著黏上的卡片
html += ... your code

// 3. 💡 再用一次 += 號：保留前面的所有東西，在最尾端黏上謝師感言
*/

    let currentPageIndex = 0;
    let itemsPerPage = 3;
    let totalPages = Math.ceil(carouselMessages.length / itemsPerPage);

    function getCurrentCards() {
        const start = currentPageIndex * itemsPerPage;
        const end = start + itemsPerPage;
        return carouselMessages.slice(start, end);
    }

    function showExpandedMessage(name, fullMsg) {
        const oldExpand = document.getElementById('expandedMessageArea');
        if (oldExpand) oldExpand.remove();
        const container = document.querySelector('.carousel-container');
        if (container) {
            const expandHtml = `
                <div id="expandedMessageArea" class="expanded-message">
                    <button class="close-expand" id="closeExpandBtn">✕</button>
                    <div class="expanded-name">🎓 ${escapeHtml(name)}</div>
                    <div class="expanded-content">${escapeHtml(fullMsg)}</div>
                </div>
            `;
            container.insertAdjacentHTML('afterend', expandHtml);
            const closeBtn = document.getElementById('closeExpandBtn');
            if (closeBtn) closeBtn.onclick = () => {
                const div = document.getElementById('expandedMessageArea');
                if (div) div.remove();
            };
        }
    }
    function renderCarouselPage() {
        const currentCards = getCurrentCards();
        let cardsHtml = '';
        currentCards.forEach(msg => {
            cardsHtml += `
                <div class="carousel-card-3" data-name="${escapeHtml(msg.name)}" data-fullmsg="${escapeHtml(msg.msg)}">
                    <div class="card-name-3">🎓 ${escapeHtml(msg.name)}</div>
                    <div class="card-preview-3">${escapeHtml(msg.msg.substring(0, 80))}...</div>
                    <div class="card-hint-3">👇點擊完整留言</div>
                </div>
            `;
        });
        return `<div class="section-card">
            <div class="section-title">🎓 留言板 </div>
            <div class="carousel-container">
                <div class="carousel-track-3" id="carouselTrack3">
                    ${cardsHtml}
                </div>
                <div class="carousel-controls-3">
                    <button class="ctrl-btn" id="prevPageBtn" ${currentPageIndex === 0 ? 'disabled' : ''}>◀ 上一組</button>
                    <button class="ctrl-btn" id="nextPageBtn" ${currentPageIndex === totalPages-1 ? 'disabled' : ''}>下一組 ▶</button>
                </div>
                <div id="expandedMessageArea" style="width:100%; margin-top:1rem;"></div>
            </div>
            <div class="info-note">✨ 👇點擊完整留言</div>
        </div>`;
    }

    function bindCarouselEvents() {
        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        
        if (prevBtn) {
            prevBtn.onclick = () => {
                if (currentPageIndex > 0) {
                    currentPageIndex--; //JS=（Decrement Operator）把目前的數字，減1。 py： -=1
                    const expandDiv = document.getElementById('expandedMessageArea');
                    if (expandDiv) expandDiv.innerHTML = '';
                    refreshCarouselUI();
                }
            };
        }
        if (nextBtn) {
            nextBtn.onclick = () => {
                if (currentPageIndex < totalPages - 1) {
                    currentPageIndex++;
                    const expandDiv = document.getElementById('expandedMessageArea');
                    if (expandDiv) expandDiv.innerHTML = '';
                    refreshCarouselUI();
                }
            };
        }
        /*Js箭頭函式寫法（~Py：lambda Anony function）
        Python：： lambda e: print(e)
        btw JS：： log e*/
        const cards = document.querySelectorAll('.carousel-card-3');
        cards.forEach(card => {
            card.onclick = (e) => {
                const name = card.getAttribute('data-name');
                const fullMsg = card.getAttribute('data-fullmsg');
                showExpandedMessage(name, fullMsg);
            };
        });
    }

    function refreshCarouselUI() {
        const container = document.getElementById('mainContent');
        const activeBtn = document.querySelector('.nav-btn.active');
        if (container && activeBtn && activeBtn.getAttribute('data-page') === 'carousel') {
            container.innerHTML = renderCarouselPage();
            bindCarouselEvents();
        }
    }

    function renderGamePage() {
        if (quizFinished) {
            let score = 0;
            for (let i = 0; i < userAnswers.length; i++) {
                if (userAnswers[i] !== null && userAnswers[i] === quizQuestions[i].correct) score++;
            }
            const familiarityMsg = getFamiliarity(score, quizQuestions.length);
            return `<div class="section-card">
                <div class="section-title">🤡 彩蛋遊戲結果</div>
                <div class="result-area">
                    <div class="score-big">${score} / ${quizQuestions.length}</div>
                    <div class="familiarity">${familiarityMsg}</div>
                    <button class="btn-submit" id="restartQuizBtn">🔄 重新挑戰</button>
                </div>
            </div>`;
        }
        
        const q = quizQuestions[currentQuizIndex];
        const hasAnswered = userAnswers[currentQuizIndex] !== null;
        const selectedIdx = userAnswers[currentQuizIndex];
        const isCorrect = hasAnswered && (selectedIdx === q.correct);
        
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            let extraStyle = '';
            let statusIcon = '';
            if (hasAnswered) {
                if (idx === q.correct) {
                    extraStyle = 'style="background: #c8e0b2; border:2px solid #4cae4c;"';
                    statusIcon = ' ✓';
                } else if (idx === selectedIdx && idx !== q.correct) {
                    extraStyle = 'style="background: #ffe0e0; border:2px solid #e74c3c;"';
                    statusIcon = ' ✗';
                }
            }
            optionsHtml += `<div class="quiz-option" data-opt="${idx}" ${extraStyle}>${String.fromCharCode(65+idx)}. ${escapeHtml(opt)}${statusIcon}</div>`;
        });
        
        const resultHtml = hasAnswered 
            ? `<div style="margin-top: 1rem; padding: 0.8rem; background: ${isCorrect ? '#d4edda' : '#f8d7da'}; border-radius: 24px; text-align: center;">
                ${isCorrect ? '✅ 答對!' : `❌ 答錯！正確答案是 ${String.fromCharCode(65+q.correct)}. ${escapeHtml(q.options[q.correct])}`}
               </div>`
            : '';
        
        return `<div class="section-card">
            <div class="section-title">🤡 彩蛋小遊戲 </div>
            <div class="quiz-area">
                <div class="quiz-question">📌 第 ${currentQuizIndex+1} / ${quizQuestions.length} 題<br>${escapeHtml(q.question)}</div>
                <div class="quiz-options" id="quizOptions">
                    ${optionsHtml}
                </div>
                ${resultHtml}
                <div style="display: flex; justify-content: center; margin-top: 1.5rem;">
                    <button class="ctrl-btn" id="nextQuizBtn" ${!hasAnswered ? 'disabled style="opacity:0.5;"' : ''}>
                        ${currentQuizIndex === quizQuestions.length-1 ? '🏆 完成並睇分數 🏆' : '下一題 ▶'}
                    </button>
                </div>
                <button class="btn-submit" id="resetQuizBtn" style="background:#b0c8a3; margin-top: 1rem;">🔄 重新開始遊戲</button>
            </div>
            <div class="info-note">💡 答完先可以去下一題。</div>
        </div>`;
    }
    
    function bindQuizEvents() {
        const options = document.querySelectorAll('.quiz-option');
        options.forEach(opt => {
            opt.removeEventListener('click', opt._clickHandler);
            const handler = () => {
                if (quizFinished) return;
                if (userAnswers[currentQuizIndex] !== null) return;
                const selected = parseInt(opt.getAttribute('data-opt'));
                userAnswers[currentQuizIndex] = selected;
                refreshQuizUI();
            };
            opt.addEventListener('click', handler);
            opt._clickHandler = handler;
        });
        
        const nextBtn = document.getElementById('nextQuizBtn');
        if (nextBtn) {
            nextBtn.onclick = () => {
                if (quizFinished) return;
                if (userAnswers[currentQuizIndex] === null) {
                    alert('請先回答當前題目～');
                    return;
                }
                if (currentQuizIndex === quizQuestions.length - 1) {
                    quizFinished = true;
                    refreshQuizUI();
                } else {
                    currentQuizIndex++;
                    refreshQuizUI();
                }
            };
        }
        
        const resetBtn = document.getElementById('resetQuizBtn');
        if (resetBtn) {
            resetBtn.onclick = () => {
                userAnswers = new Array(quizQuestions.length).fill(null);
                currentQuizIndex = 0;
                quizFinished = false;
                refreshQuizUI();
            };
        }
        
        const restartBtn = document.getElementById('restartQuizBtn');
        if (restartBtn) {
            restartBtn.onclick = () => {
                userAnswers = new Array(quizQuestions.length).fill(null);
                currentQuizIndex = 0;
                quizFinished = false;
                refreshQuizUI();
            };
        }
    }
    
    function refreshQuizUI() {
        const container = document.getElementById('mainContent');
        const activeBtn = document.querySelector('.nav-btn.active');
        if (container && activeBtn && activeBtn.getAttribute('data-page') === 'game') {
            container.innerHTML = renderGamePage();
            bindQuizEvents();
        }
    }

    let currentPage = 'pdf';
    
    function switchToPage(pageId) {
        currentPage = pageId;
        let html = '';
        if (pageId === 'teacher') html = renderTeacherPage();
        else if (pageId === 'carousel') html = renderCarouselPage();
        else if (pageId === 'game') html = renderGamePage();
        else if (pageId === 'pdf') html = renderPdfPage();
        else if (pageId === 'links') html = renderLinksPage();
        
        const contentDiv = document.getElementById('mainContent');
        if (contentDiv) contentDiv.innerHTML = html;
        
        if (pageId === 'teacher') bindTeacherEvents();
        if (pageId === 'carousel') bindCarouselEvents();
        if (pageId === 'game') bindQuizEvents();
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            if (btn.getAttribute('data-page') === pageId) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    function bindNavEvents() {
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => switchToPage(btn.getAttribute('data-page')));
        });
        const logoHome = document.getElementById('homeLogoBtn');
        if (logoHome) logoHome.addEventListener('click', () => switchToPage('carousel'));
    }
    
    function init() { 
        switchToPage('carousel');
        bindNavEvents(); 
    }
    
    init();
</script>
<div id="teacherModal" class="modal" onclick="closeTeacherModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closeTeacherModal()">&times;</span>
        <div class="modal-name" id="teacherModalName"></div>
        <div class="modal-message" id="teacherModalMessage"></div>
    </div>
</div>
</body>
</html>
